        const calculateEmploymentDetails = (entryDateStr, baseType) => {
            if (!entryDateStr || entryDateStr === '未知') return { status: baseType || '未知', duration: '未知' };
            const entryDate = new Date(entryDateStr);
            if (isNaN(entryDate)) return { status: baseType || '未知', duration: '未知' };

            const diffTime = CURRENT_DATE - entryDate;
            const diffMonths = diffTime / (1000 * 60 * 60 * 24 * 30);
            
            let duration = diffMonths < 1 && diffTime >= 0 ? `${Math.ceil(diffMonths * 30)}天` : `${Math.floor(diffMonths)}个月`;
            if (diffMonths >= 12) duration = `${(diffMonths / 12).toFixed(1)}年`;
            if (diffTime < 0) duration = '未入职';

            let status = baseType;
            if (baseType === '正式员工') {
                if (diffTime < 0) status = '正式员工（待入职）';
                else if (diffMonths <= 3) status = '试用一期';
                else if (diffMonths <= 6) status = '试用二期';
                else status = '正式';
            } else if (baseType === '实习生') {
                if (diffTime < 0) status = '实习生（待入职）';
                else status = '实习生';
            } else if (baseType === '正式员工（已转正）' || baseType === '正式') {
                status = '正式';
            } else {
                status = baseType;
            }
            return { status, duration };
        };

        const parseAIResponse = (text) => {
            try {
                let cleanText = text.replace(/```json/gi, '').replace(/```/g, '').trim();
                const firstBrace = cleanText.indexOf('{');
                const lastBrace = cleanText.lastIndexOf('}');
                if (firstBrace !== -1 && lastBrace !== -1) cleanText = cleanText.substring(firstBrace, lastBrace + 1);
                return JSON.parse(cleanText);
            } catch (e) { throw new Error("AI解析返回格式异常"); }
        };

        function App() {
            const [activeTab, setActiveTab] = useState('kanban');

                const saved = localStorage.getItem('beta_team_data');
                if (saved) {
                    let parsed = JSON.parse(saved);
                    parsed.departments = parsed.departments.map(d => {
                        if (d.branches) { d.groups = d.branches; delete d.branches; }
                        if (d.roles) { d.groups = d.roles; delete d.roles; }
                        return d;
                    });
                    return parsed;
                }
                return initialTeamArchitecture;
            });
            const [resignedStaff, setResignedStaff] = useState(() => {

            const [sfApiKey, setSfApiKey] = useState(localStorage.getItem('sf_api_key') || "");

            const [aiInputText, setAiInputText] = useState("");

            // 打分面板状态

            const [selectedRule, setSelectedRule] = useState(null);
            const [observation, setObservation] = useState("");
            const [manualScoreChange, setManualScoreChange] = useState(""); 
            
            const [strategyInput, setStrategyInput] = useState("");
            const [strategyReport, setStrategyReport] = useState(null);
            const [isStrategyLoading, setIsStrategyLoading] = useState(false);

            const getTeamMetrics = () => {
                let headcount = 0, riskCount = 0, totalMonthlyCost = 0, totalScore = 0, validScoreCount = 0;
                const processUser = (u) => {
                    if (u && !u.isVacant && !(u.type && u.type.includes('待入职'))) {
                        headcount++;
                        if (Number(u.score) !== undefined) {
                            totalScore += Number(u.score);
                            validScoreCount++;
                            if (Number(u.score) < 80) riskCount++;
                        }
                        if (u.salary && u.salary !== "未知" && !u.salary.includes("天") && !u.salary.includes("保密")) {
                            const num = parseInt(u.salary.toString().replace(/,/g, ''), 10);
                            if (!isNaN(num) && num > 1000) totalMonthlyCost += num;
                        }
                    }
                };
                processUser(data.producer);
                data.departments.forEach(dept => {
                    if(dept.lead) processUser(dept.lead);
                    dept.groups?.forEach(g => g.members.forEach(processUser));
                });
                return { headcount, riskCount, totalMonthlyCost: totalMonthlyCost.toLocaleString(), avgScore: validScoreCount ? (totalScore/validScoreCount).toFixed(1) : 0 };
            };

            const fetchSiliconFlowAPI = async (systemPrompt, userPrompt) => {
                if (!sfApiKey) throw new Error("API_KEY_MISSING");
                const response = await fetch("https://api.siliconflow.cn/v1/chat/completions", {
                    method: "POST", headers: { "Authorization": `Bearer ${sfApiKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: sfModel, messages: [ { role: "system", content: systemPrompt }, { role: "user", content: userPrompt } ], response_format: { type: "text" } })
                });
                if (!response.ok) { const err = await response.json(); throw new Error(err.message || "API 请求失败"); }
                const result = await response.json();
                return result.choices[0].message.content;
            };

            const updateGlobalUser = (updatedUser) => {
                setSelectedUser(updatedUser);
                const newData = { ...data };
                if (newData.producer.id === updatedUser.id) {
                    newData.producer = updatedUser;
                } else {
                    newData.departments = newData.departments.map(dept => {
                        if (dept.lead && dept.lead.id === updatedUser.id) return { ...dept, lead: updatedUser };
                        return { ...dept, groups: dept.groups.map(g => ({ ...g, members: g.members.map(m => m.id === updatedUser.id ? updatedUser : m) })) };
                    });
                }
                setData(newData);
            };

            // ========== 显隐状态引擎 ==========
            const toggleLeadHidden = (deptId, isHidden) => {
                let newData = { ...data };
                newData.departments.find(d => d.id === deptId).isLeadHidden = isHidden;
                setData(newData);
            };

            const toggleGroupHidden = (deptId, groupTitle, isHidden) => {
                let newData = { ...data };

            };

            // ========== AI智能花名册匹配与容错核心引擎 ==========
            const getMatchedLocation = (roleStr) => {
                const role = roleStr.toLowerCase();
                if (role.includes('主策')) return { dept: '策划部', isLead: true };
                if (role.includes('系统')) return { dept: '策划部', group: '系统策划' };
                if (role.includes('数值')) return { dept: '策划部', group: '数值策划' };
                if (role.includes('活动')) return { dept: '策划部', group: '活动策划' };
                if (role.includes('关卡')) return { dept: '策划部', group: '关卡策划' };
                if (role.includes('策')) return { dept: '策划部', group: '系统策划' };
                
                if (role.includes('主程')) return { dept: '程序部', isLead: true };
                if (role.includes('前') || role.includes('unity') || role.includes('cocos') || role.includes('client')) return { dept: '程序部', group: '前端开发' };
                if (role.includes('后') || role.includes('server') || role.includes('java') || role.includes('c++')) return { dept: '程序部', group: '后端开发' };
                if (role.includes('程') || role.includes('开发')) return { dept: '程序部', group: '前端开发' };
                
                if (role.includes('主美')) return { dept: '美术部', isLead: true };
                if (role.includes('原画')) return { dept: '美术部', group: '原画' };
                if (role.includes('ui')) return { dept: '美术部', group: 'UI' };
                if (role.includes('3d') || role.includes('模型')) return { dept: '美术部', group: '3D模型' };
                if (role.includes('动效') || role.includes('特效')) return { dept: '美术部', group: '动效' };
                if (role.includes('美')) return { dept: '美术部', group: '原画' };
                
                if (role.includes('优化') || role.includes('投放')) return { dept: '市场运营部', group: '优化师' };
                if (role.includes('平面')) return { dept: '市场运营部', group: '平面设计' };
                if (role.includes('视频')) return { dept: '市场运营部', group: '视频设计' };
                if (role.includes('市场')) return { dept: '市场运营部', group: '市场负责人' };
                if (role.includes('运营')) return { dept: '市场运营部', group: '运营' };
                
                if (role.includes('测') || role.includes('qa')) return { dept: '测试部', group: '测试执行' };
                return { dept: '市场运营部', group: roleStr }; 
            };

            const handleSyncRoster = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsSyncingExcel(true);
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const workbook = window.XLSX.read(new Uint8Array(event.target.result), {type: 'array'});

                        let updatedCount = 0; let newCount = 0;

                        jsonRaw.forEach(row => {
                            const nameKey = Object.keys(row).find(k => k.includes('姓名') || k.includes('名字'));
                            if (!nameKey || !row[nameKey]) return; 
                            const empName = row[nameKey].toString().trim();

                            const roleKey = Object.keys(row).find(k => k.includes('岗位') || k.includes('职位'));
                            const dateKey = Object.keys(row).find(k => k.includes('入职'));
                            const typeKey = Object.keys(row).find(k => k.includes('状态') || k.includes('用工'));
                            const salaryKey = Object.keys(row).find(k => k.includes('薪') || k.includes('工资'));
                            const eduKey = Object.keys(row).find(k => k.includes('学历'));
                            const schoolKey = Object.keys(row).find(k => k.includes('学校') || k.includes('院校'));

                            let found = false;
                            const applyUpdates = (emp) => {
                                found = true;
                                if (roleKey && row[roleKey]) emp.role = row[roleKey].toString().trim();
                                if (dateKey && row[dateKey]) emp.entryDate = row[dateKey].toString().replace(/\//g, '-');
                                if (typeKey && row[typeKey]) emp.type = row[typeKey].toString().trim();
                                if (salaryKey && row[salaryKey]) emp.salary = row[salaryKey].toString().trim();
                                if (eduKey && row[eduKey]) emp.education = row[eduKey].toString().trim();
                                if (schoolKey && row[schoolKey]) emp.school = row[schoolKey].toString().trim();
                                updatedCount++;
                            };

                            if (newData.producer && newData.producer.name === empName) applyUpdates(newData.producer);
                            newData.departments.forEach(dept => {
                                if (dept.lead && dept.lead.name === empName) applyUpdates(dept.lead);
                                dept.groups?.forEach(g => g.members.forEach(m => { if(m.name === empName) applyUpdates(m); }));
                            });

                            if (!found) {
                                newCount++;
                                const rawRole = roleKey && row[roleKey] ? row[roleKey].toString().trim() : '未知职位';
                                const newEmp = {
                                    id: 'emp_' + Math.random().toString(36).substr(2, 9),
                                    name: empName, role: rawRole,
                                    type: typeKey ? row[typeKey].toString().trim() : '正式员工',
                                    entryDate: dateKey && row[dateKey] ? row[dateKey].toString().replace(/\//g, '-') : CURRENT_DATE.toISOString().split('T')[0],
                                    salary: salaryKey ? row[salaryKey].toString().trim() : '未知',
                                    education: eduKey ? row[eduKey].toString().trim() : '未知',
                                    school: schoolKey ? row[schoolKey].toString().trim() : '未知',
                                    score: 100, talentTag: '', behaviors: []
                                };

                                const targetLoc = getMatchedLocation(rawRole);
                                const targetDept = newData.departments.find(d => d.name === targetLoc.dept) || newData.departments[0];
                                
                                if (targetLoc.isLead) {
                                    targetDept.lead = newEmp;

                                            </label>
                                        </div>
                                        <div className="p-5">
                                            {!selectedUser.aiProfile ? (
                                                <div className="space-y-4">
                                                    <p className="text-xs text-slate-400">您可以直接粘贴历史记录，或使用右上角上传该员工的《面试评估报告》，AI 将自动提取该员工的冰山底盘模型。</p>
                                                    <textarea value={aiInputText} onChange={(e) => setAiInputText(e.target.value)} placeholder="在此粘贴评估报告内容、文本，或直接上传文档..." className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-xs text-slate-300 outline-none focus:border-blue-500 h-28 resize-none"/>
                                                    <button onClick={handleGenerateAIProfile} disabled={isAiGenerating || !aiInputText.trim()} className="flex items-center justify-center gap-2 bg-blue-600/20 text-blue-400 border border-blue-500/50 hover:bg-blue-600/40 px-4 py-2.5 rounded-lg w-full text-sm font-bold transition-all disabled:opacity-50">
                                                        {isAiGenerating ? <Loader2 className="w-4 h-4 animate-spin"/> : <BrainCircuit className="w-4 h-4"/>} {isAiGenerating ? "生成中..." : "提取结构化人才画像"}
                                                    </button>
                                                </div>
                                            ) : (
                                                <div className="space-y-5 animate-in fade-in duration-500">
                                                    <div className="bg-blue-950/10 p-4 rounded-lg border border-blue-900/30">
                                                        <p className="text-sm text-slate-300 italic mb-3">"{selectedUser.aiProfile.summary}"</p>
                                                        <div className="flex flex-wrap gap-2">{selectedUser.aiProfile.tags?.map((tag, i) => (<span key={i} className="text-[10px] bg-blue-900/40 text-blue-300 border border-blue-500/30 px-2 py-1 rounded-full">{tag}</span>))}</div>
                                                    </div>
                                                    <div className="grid grid-cols-2 gap-4">
                                                        <div className="bg-slate-950 p-3 rounded-lg border border-slate-800">
                                                            <h4 className="text-[10px] font-bold text-slate-400 mb-3 uppercase flex items-center gap-1">🧊 冰山之上 (硬技能)</h4>
                                                            <div className="space-y-3">{selectedUser.aiProfile.icebergAbove?.map((item, i) => (<div key={i} className="border-l-2 border-slate-700 pl-2"><div className="flex justify-between text-xs mb-1"><span className="font-medium text-slate-200">{item.skill}</span><span className={item.level.includes('及格') || item.level.includes('优秀') ? 'text-green-400' : 'text-red-400'}>{item.level}</span></div><div className="text-[10px] text-slate-500 leading-tight">{item.desc}</div></div>))}</div>
                                                        </div>
                                                        <div className="bg-slate-950 p-3 rounded-lg border border-slate-800">
                                                            <h4 className="text-[10px] font-bold text-slate-400 mb-3 uppercase flex items-center gap-1">🌊 冰山之下 (软素质)</h4>
                                                            <div className="space-y-3">{selectedUser.aiProfile.icebergBelow?.map((item, i) => (<div key={i} className="border-l-2 border-slate-700 pl-2"><div className="flex justify-between text-xs mb-1"><span className="font-medium text-slate-200">{item.trait}</span><span className="text-yellow-400">{item.score}</span></div><div className="text-[10px] text-slate-500 leading-tight">{item.desc}</div></div>))}</div>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    {/* 模块3: 绑定考核量化包 */}
                                    <div className="bg-indigo-950/20 rounded-xl border border-indigo-500/30 p-5">
                                        <h3 className="text-[11px] font-bold text-indigo-400 mb-4 uppercase tracking-widest">3. 绑定岗位考核量化包</h3>
                                        <div className="relative">
                                            <select value={selectedUser.assessmentTemplateId || ""} onChange={(e) => updateGlobalUser({ ...selectedUser, assessmentTemplateId: e.target.value })} className={`w-full bg-slate-900 border text-sm rounded-lg p-3 pr-10 appearance-none outline-none ${!selectedUser.assessmentTemplateId ? 'border-yellow-500/50 text-yellow-300' : 'border-slate-700 text-slate-200'}`}>
                                                <option value="" disabled>⚠️ 尚未关联考核包，请下拉选择...</option>
                                                {scoringTemplates.map(tpl => <option key={tpl.id} value={tpl.id}>{tpl.name}</option>)}
                                            </select>
                                            <ChevronDown className="w-4 h-4 text-slate-500 absolute right-4 top-3.5 pointer-events-none"/>
                                        </div>
                                    </div>

                                    {/* 模块4: 事实细节录入与打分结算 */}
                                    <div className="bg-slate-900 rounded-xl border border-slate-700 shadow-inner overflow-hidden">
                                        <div className="p-4 border-b border-slate-800 bg-slate-800/40"><h3 className="text-[11px] font-bold text-slate-300 uppercase tracking-widest">4. 事实细节录入与打分结算</h3></div>
                                        <div className="p-5 space-y-5">
                                            <div className="flex gap-4 border-b border-slate-800 pb-3">
                                                <button onClick={() => setScoreMode('rule')} className={`text-[13px] font-bold pb-2 border-b-2 transition-colors ${scoreMode === 'rule' ? 'text-blue-400 border-blue-500' : 'text-slate-500 border-transparent hover:text-slate-300'}`}>基于考核包打分</button>
                                                <button onClick={() => setScoreMode('manual')} className={`text-[13px] font-bold pb-2 border-b-2 transition-colors ${scoreMode === 'manual' ? 'text-blue-400 border-blue-500' : 'text-slate-500 border-transparent hover:text-slate-300'}`}>手动变更分数 (审计)</button>
                                            </div>
                                            {scoreMode === 'rule' ? (
                                                <div>
                                                    <div className="flex flex-wrap gap-2.5">
                                                        {!selectedUser.assessmentTemplateId ? (
                                                            <div className="text-xs text-yellow-500/70 p-3 bg-yellow-950/10 rounded border border-yellow-900/30 w-full text-center">需先在模块3绑定岗位规范，此处才会出现打分选项。</div>
                                                        ) : (
                                                            scoringTemplates.find(t => t.id === selectedUser.assessmentTemplateId)?.rules.map(rule => (
                                                                <button key={rule.id} onClick={() => setSelectedRule(selectedRule?.id === rule.id ? null : rule)} className={`text-xs px-3 py-2 rounded border transition-all flex items-center gap-2 ${selectedRule?.id === rule.id ? (rule.penalty < 0 ? 'bg-red-900/60 border-red-500 text-red-100' : 'bg-green-900/60 border-green-500 text-green-100') : 'bg-slate-800 border-slate-700 text-slate-300 hover:border-slate-500'}`}>
                                                                    <span>{rule.name}</span><span className="font-mono font-bold">{rule.penalty > 0 ? '+' : ''}{rule.penalty}</span>
                                                                </button>
                                                            ))
                                                        )}
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className="bg-blue-950/10 border border-blue-900/40 p-4 rounded-lg">
                                                    <label className="text-xs text-blue-300 font-medium mb-2 block">强制输入分值变动 (扣分为负，加分为正)</label>
                                                    <div className="flex items-center gap-3">
                                                        <input type="number" value={manualScoreChange} onChange={(e) => setManualScoreChange(e.target.value)} placeholder="例: -5 或 +10" className="bg-slate-950 border border-blue-900/50 rounded p-2 text-white w-32 font-mono outline-none focus:border-blue-400" />
                                                        <span className="text-xs text-slate-500">变动后将重算大盘分数</span>
                                                    </div>
                                                </div>
                                            )}
                                            <div>
                                                <label className="text-xs text-slate-400 font-medium mb-2 block">事实细节备注 <span className="text-red-400">*</span></label>
                                                <textarea value={observation} onChange={(e) => setObservation(e.target.value)} placeholder={scoreMode === 'rule' ? "请简述触发该条款的客观事实..." : "严禁无理由手动改分！必须详细填写调整原因与依据..."} className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-sm text-slate-200 outline-none focus:border-blue-500 h-24 resize-none" />
                                            </div>
                                            <div className="flex justify-end"><button onClick={handleSubmitScore} className="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg text-sm font-bold shadow-md">确认录入台账</button></div>
                                        </div>
                                    </div>

                                    {/* 模块5: 在岗台账历史 */}
                                    <div>
                                        <h3 className="text-[11px] font-bold text-slate-500 mb-5 uppercase tracking-widest">5. 在岗台账历史</h3>
                                        <div className="space-y-4 relative before:absolute before:inset-0 before:ml-[11px] before:h-full before:w-px before:bg-slate-700/50">
                                            {selectedUser.behaviors && selectedUser.behaviors.length > 0 ? (
                                                selectedUser.behaviors.map((beh, idx) => (
                                                    <div key={idx} className="relative flex items-start gap-4">
                                                        <div className={`mt-1.5 w-6 h-6 rounded-full border-[4px] border-[#0F172A] z-10 shrink-0 ${beh.penalty < 0 ? 'bg-red-500' : beh.penalty > 0 ? 'bg-green-500' : 'bg-slate-500'}`}></div>
                                                        <div className="flex-1 bg-slate-900 p-3.5 rounded-xl border border-slate-700/60 shadow-sm">
                                                            <div className="flex justify-between items-center mb-2"><span className="text-[10px] text-slate-400 font-mono bg-slate-950 px-1.5 py-0.5 rounded">{beh.date}</span>{beh.penalty !== 0 && <span className={`text-[11px] font-bold px-2 py-0.5 rounded ${beh.penalty < 0 ? 'bg-red-500/20 text-red-400' : 'bg-green-500/20 text-green-400'}`}>{beh.penalty > 0 ? '+' : ''}{beh.penalty}分</span>}</div>
                                                            <p className="text-xs text-slate-300 leading-relaxed">{beh.desc}</p>
                                                        </div>
                                                    </div>
                                                ))
                                            ) : (
                                                <div className="pl-8 text-sm text-slate-600 italic">该员工暂无打分历史记录。</div>
                                            )}
                                        </div>
                                    </div>

                                </div>
                            </div>
                        </>
                    )}

                    {/* === 待招 HC 设定弹窗 === */}
                    {showAddHcModal && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-[90] flex items-center justify-center p-4">
                            <div className="bg-slate-900 border border-blue-900/40 rounded-2xl w-full max-w-sm p-6">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="font-bold text-white flex items-center gap-2"><UserPlus className="w-5 h-5 text-blue-400"/> 新增待招 HC</h3>
                                    <button onClick={() => setShowAddHcModal(false)} className="text-slate-400 hover:text-white"><X className="w-4 h-4"/></button>
                                </div>
                                <div className="space-y-4">
                                    <div><label className="text-xs text-slate-400 mb-1 block">岗位名称 (自动继承组名可改)</label><input type="text" value={hcData.name} onChange={e=>setHcData({...hcData, name:e.target.value})} className="w-full bg-slate-950 border border-slate-700 rounded p-2.5 text-sm text-white outline-none focus:border-blue-500" /></div>
                                    <div>
                                        <label className="text-xs text-slate-400 mb-1 block">岗位级别</label>
                                        <select value={hcData.level} onChange={e=>setHcData({...hcData, level:e.target.value})} className="w-full bg-slate-950 border border-slate-700 rounded p-2.5 text-sm text-white outline-none focus:border-blue-500">
                                            {['P0','P1','P2','P3','M1','M2'].map(lvl => <option key={lvl} value={lvl}>{lvl}</option>)}
                                        </select>
                                    </div>
                                    <button onClick={handleAddHcSubmit} className="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2.5 rounded-lg text-sm mt-2">确认锁定编制</button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* === 新增实体员工弹窗 === */}
                    {showAddEmpModal && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-[90] flex items-center justify-center p-4">
                            <div className="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-sm p-6 shadow-2xl">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="font-bold text-white flex items-center gap-2"><UserCircle2 className="w-5 h-5 text-slate-400"/> 新增入职建档</h3>
                                    <button onClick={() => setShowAddEmpModal(false)} className="text-slate-400 hover:text-white"><X className="w-4 h-4"/></button>
                                </div>
                                <div className="space-y-4">
                                    <p className="text-xs text-slate-400">系统已接通 AI 引擎。上传简历或面试文本可自动解析姓名等所有信息，并归入 <strong>{addTarget?.groupTitle}</strong> 组。</p>
                                    <label className="cursor-pointer bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-700 w-full py-3 rounded-lg text-sm font-bold shadow-md transition-all flex justify-center items-center gap-2">
                                        {isParsingFile ? <Loader2 className="w-4 h-4 animate-spin"/> : <UploadCloud className="w-4 h-4"/>} 
                                        上传文本并智能建档
                                        <input type="file" className="hidden" accept=".txt,.html,.doc,.docx,.pdf" onChange={handleAiAddEmployee} ref={addEmpFileRef} />
                                    </label>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* === 全局系统配置弹窗 === */}
                    {showSettingsModal && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-[80] flex items-center justify-center p-4">
                            <div className="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-2xl max-h-[90vh] flex flex-col shadow-2xl">
                                <div className="p-5 border-b border-slate-800 flex justify-between items-center bg-slate-800/40">
                                    <h2 className="text-lg font-bold text-white flex items-center gap-2"><FileCog className="w-5 h-5"/> 系统设置与配置库</h2>
                                    <button onClick={() => { setShowSettingsModal(false); setIsCreatingTpl(false); }} className="text-slate-400 hover:text-white"><X className="w-5 h-5"/></button>
                                </div>
                                <div className="p-6 overflow-y-auto flex-1 custom-scrollbar space-y-8">
                                    <div className="bg-[#0B1120] border border-blue-900/50 rounded-xl p-5 shadow-inner relative">
                                        <h3 className="text-sm font-bold text-blue-400 mb-4 flex items-center gap-2"><Key className="w-4 h-4"/> 硅基流动 (SiliconFlow) API 引擎配置</h3>
                                        <div className="space-y-4">
                                            <div><label className="block text-[11px] text-slate-500 mb-1.5 uppercase tracking-wider">API Key (sk-...)</label><input type="password" value={sfApiKey} onChange={e => {setSfApiKey(e.target.value); localStorage.setItem('sf_api_key', e.target.value)}} className="w-full bg-slate-900 border border-slate-700 p-2.5 rounded text-white outline-none focus:border-blue-500 text-sm" placeholder="请填入您的 SiliconFlow 密钥" /></div>
                                            <div>
                                                <label className="block text-[11px] text-slate-500 mb-1.5 uppercase tracking-wider">首选 AI 模型</label>
                                                <select value={sfModel} onChange={e => {setSfModel(e.target.value); localStorage.setItem('sf_model', e.target.value)}} className="w-full bg-slate-900 border border-slate-700 p-2.5 rounded text-white outline-none focus:border-blue-500 text-sm">
                                                    <option value="deepseek-ai/DeepSeek-V3">DeepSeek-V3 (推荐: 极客推理极强)</option>
                                                    <option value="Qwen/Qwen2.5-72B-Instruct">Qwen2.5-72B (备选: 指令遵循强)</option>
                                                </select>
                                            </div>
                                            <p className="text-[10px] text-slate-500 border-l-2 border-slate-700 pl-2">您的密钥仅加密存储在本地浏览器的 localStorage 中，退出后不会泄露，请放心使用。</p>
                                        </div>
                                    </div>
                                    
                                    {/* 考核包模板管理区域 */}
                                    <div>
                                        {!isCreatingTpl ? (
                                            <>
                                                <div className="flex justify-between items-center mb-4"><h3 className="text-sm font-bold text-slate-300 flex items-center gap-2"><FileCog className="w-4 h-4"/> 岗位考核大类模版库</h3><button onClick={() => setIsCreatingTpl(true)} className="flex items-center gap-1 text-xs bg-blue-600/20 hover:bg-blue-600/40 text-blue-400 px-3 py-1.5 rounded border border-blue-500/50"><Plus className="w-3 h-3"/> 新增考核大类</button></div>
                                                <div className="grid grid-cols-2 gap-4">
                                                    {scoringTemplates.map(tpl => (
                                                        <div key={tpl.id} className="bg-slate-950 border border-slate-800 rounded-lg p-4 group relative hover:border-blue-500/30 transition-all">
                                                            <div className="font-bold text-slate-200 text-sm mb-1">{tpl.name}</div>
                                                            <div className="text-xs text-slate-500">内含 <strong className="text-blue-400">{tpl.rules.length}</strong> 项打分细则</div>
                                                            <button onClick={() => handleDeleteTemplate(tpl.id)} className="absolute top-3 right-3 text-slate-600 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity"><Trash2 className="w-4 h-4"/></button>
                                                        </div>
                                                    ))}
                                                </div>
                                            </>
                                        ) : (
                                            <div className="space-y-4 bg-slate-900 border border-blue-900/40 p-5 rounded-xl animate-in fade-in">
                                                <div className="flex justify-between items-center border-b border-slate-800 pb-2"><h3 className="text-sm font-bold text-blue-400">创建新考核大类</h3><button onClick={() => setIsCreatingTpl(false)} className="text-xs text-slate-500">返回</button></div>
                                                <div><label className="text-xs text-slate-400 mb-1 block">大类名称 *</label><input type="text" value={newTplName} onChange={(e) => setNewTplName(e.target.value)} placeholder="如：系统策划考核标准" className="w-full bg-slate-950 border border-slate-700 rounded p-2 text-sm outline-none focus:border-blue-500" /></div>
                                                <div className="space-y-3"><label className="text-xs text-slate-400 block">预设扣分/加分细则 (至少1条) *</label><div className="flex gap-2"><input type="text" value={draftRuleName} onChange={(e) => setDraftRuleName(e.target.value)} placeholder="规则描述 (如: 进度延期)" className="flex-1 bg-slate-950 border border-slate-700 rounded p-2 text-xs outline-none" /><input type="number" value={draftRulePenalty} onChange={(e) => setDraftRulePenalty(e.target.value)} placeholder="分值 (如: -10)" className="w-24 bg-slate-950 border border-slate-700 rounded p-2 text-xs outline-none" /><button onClick={handleAddDraftRule} className="bg-slate-800 hover:bg-slate-700 px-3 rounded text-xs border border-slate-700">添加</button></div>
                                                    {newTplRules.length > 0 && <div className="mt-3 space-y-1">{newTplRules.map((r, i) => (<div key={i} className="flex justify-between items-center bg-slate-950 p-2 rounded text-xs border border-slate-800"><span className="text-slate-300">{r.name}</span><span className={`font-mono font-bold ${r.penalty < 0 ? 'text-red-400' : 'text-green-400'}`}>{r.penalty > 0 ? '+' : ''}{r.penalty}</span></div>))}</div>}
                                                </div>
                                                <button onClick={handleSaveNewTemplate} className="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 rounded-lg text-sm mt-2">保存大类</button>
                                            </div>
                                        )}
                                    </div>

                                    <button onClick={handleResetData} className="flex items-center gap-1.5 text-[10px] bg-red-950/40 hover:bg-red-900/60 text-red-400 border border-red-900/50 px-3 py-2 rounded transition-all"><RotateCcw className="w-3 h-3"/> 恢复出厂设置并清空所有缓存数据</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
